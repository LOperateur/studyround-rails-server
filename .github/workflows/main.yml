name: Deploy From Github To AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{secrets.AWS_ROLE}}
          aws-region: ${{secrets.AWS_REGION}}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build and push image to Amazon ECR staging repo
        if: ${{ github.base_ref == 'staging' || github.ref == 'refs/heads/staging' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: staging-studyround-ruby-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
      - name: Build and push image to Amazon ECR production repo
        if: ${{ github.base_ref == 'main' || github.ref == 'refs/heads/main' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: production-studyround-ruby-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy App to AWS
        if: ${{ github.base_ref == 'staging' || github.ref == 'refs/heads/staging' }}
        uses: convictional/trigger-workflow-and-wait@v1.6.1
        with:
          owner: LOperateur
          repo: studyround-devops
          github_token: ${{ secrets.G_ACCESS_TOKEN }}
          workflow_file_name: main.yml
          ref: staging
          client_payload: '{"triggered": "true", "tag": "${{ github.sha }}", "container": "studyround-backend", "queue": "sidekiq"}'
      - name: Deploy App to AWS
        if: ${{ github.base_ref == 'main' || github.ref == 'refs/heads/main' }}
        uses: convictional/trigger-workflow-and-wait@v1.6.1
        with:
          owner: LOperateur
          repo: studyround-devops
          github_token: ${{ secrets.G_ACCESS_TOKEN }}
          workflow_file_name: main.yml
          ref: main
          client_payload: '{"triggered": "true", "tag": "${{ github.sha }}", "container": "studyround-backend", "queue": "sidekiq"}'
