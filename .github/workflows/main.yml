name: Deploy From Github To AWS

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Docker Login
        env:
          DOCKER_USER: ${{secrets.DOCKER_USER}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
      - name: Build Ulearn backend docker image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: caleb42/u-learn-ruby-backend:latest
      - name: Build ulearn sidekiq docker image
        run: docker build . --file Dockerfile.sidekiq --tag caleb42/u-learn-ruby-sidekiq:latest
      - name: Docker Push
        run: docker push caleb42/u-learn-ruby-sidekiq:latest
  build-sidekiq:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v2
      - name: Docker Login
        env:
          DOCKER_USER: ${{secrets.DOCKER_USER}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
      - name: Build ulearn sidekiq docker image
        run: docker build . --file Dockerfile.sidekiq --tag caleb42/u-learn-ruby-sidekiq:latest
      - name: Docker Push
        run: docker push caleb42/u-learn-ruby-sidekiq:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build-sidekiq

    steps:
      - name: Deploy App to AWS
        uses: convictional/trigger-workflow-and-wait@v1.6.1
        with:
          owner: LOperateur
          repo: ulearn-nginx-proxy
          github_token: ${{ secrets.G_ACCESS_TOKEN }}
          workflow_file_name: staging.yml
          ref: development
